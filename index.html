<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body>
    <main>
      <section class="left">
        <h1 class="sub-head">Come join us!</h1>
        <p class="about">
          We are excited to have you here! if you havent already, create an
          account to get access to exclusive offer, rewards, and discounts.
        </p>
        <button class="sub-button">Already have an account? Sign in</button>
      </section>
      <section class="right">
        <div action="https://signup.com" method="POST" novalidate>
          <h1 class="main-head">Sign Up</h1>
          <div class="input-container">
            <!-- <i class="fa fa-user" aria-hidden="true"></i> -->
            <input
              type="name"
              id="username"
              name="username"
              placeholder="&#xf007;  Username"
            />
          </div>
           <div class="input-container"></div>
            <input type="email" id="email" name="email" placeholder="&#xf0e0;  Email" />
        </div>
        <div class="input-container">
      
            <input
            type="password"
            id="password"
            name="password"
            placeholder="&#xf023;  password"
            />
        </div>
        <div class="input-container">
    
            <input
            type="password"
            id="confirm-passwrod"
            name="confirm-passwrod"
            placeholder="&#xf023;  Confirm Password"
            />
        </div>
          <button class="main-button">Sign Up</button>
          <p class="more-action">or signup with</p>
          <footer>
            <div class="social">
                <a href="#">

                    <i class="fa fa-facebook-official"></i>
                </a>
            </div>
          <div class="social">
            <a href="#">

                <i class="fa fa-twitter" ></i>
            </a>
          </div>
          <div class="social">
            <a href="#">

                <i class="fa fa-instagram" ></i>
            </a>
            </div>
        </footer>
        </form>
      </section>
    </main>
  </body>
</html>
